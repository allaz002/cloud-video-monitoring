services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-video-monitoring-postgres
    environment:
      POSTGRES_DB: cloud_video_monitoring
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cloud_video_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
