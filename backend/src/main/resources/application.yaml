server:
  port: 8081

spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5433/cloud_video_monitoring
    username: app
    password: app
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: cloud-video-monitoring
    description: Camera monitoring application
